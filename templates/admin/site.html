{{ define "admin_site" }}
{{ template "admin_head" . }}
{{ template "admin_shell_open" . }}

{{ if .Saved }}<script>showToast('设置已保存', 'success');</script>{{ end }}

<form method="post" action="/admin/site" class="form">
  <label>网站名称
    <input name="site_name" value="{{ .Setting.SiteName }}">
  </label>
  <label>签名 / 副标题
    <input name="site_subtitle" value="{{ .Setting.SiteSubtitle }}">
  </label>
  <label>首页欢迎语
    <input name="welcome_text" value="{{ .Setting.WelcomeText }}" placeholder="留空则显示：欢迎来到 网站名">
  </label>
  <label>页脚文字
    <input name="footer_text" value="{{ .Setting.FooterText }}" placeholder="留空则显示：Powered by Fool Blog · Go">
  </label>
  <label>建站时间
    <input type="datetime-local" name="site_created_at" value="{{ formatInputTime .Setting.SiteCreatedAt }}">
  </label>
  <label>公告文字
    <textarea name="announcement" rows="3" placeholder="纯文本公告内容">{{ .Setting.Announcement }}</textarea>
  </label>
  <label>公告文章
    <select name="announcement_article_id">
      <option value="">不关联文章</option>
      {{ range .Articles }}
      <option value="{{ .ID }}" {{ if $.Setting.AnnouncementArticleID }}{{ if eq .ID $.Setting.AnnouncementArticleID.ID }}selected{{ end }}{{ end }}>{{ .Title }}</option>
      {{ end }}
    </select>
    <span style="font-size:12px;color:var(--text-secondary);margin-top:4px">选择一篇文章，在首页公告区域显示链接</span>
  </label>
  <label>作者介绍
    <textarea name="author_intro" rows="3">{{ .Setting.AuthorIntro }}</textarea>
  </label>
  <label>壁纸 API
    <input name="wallpaper_api" value="{{ .Setting.WallpaperAPI }}">
  </label>
  <label>自定义壁纸 URL
    <input name="custom_wallpaper" value="{{ .Setting.CustomWallpaper }}">
  </label>
  <label class="check">
    <input type="checkbox" name="enable_wallpaper" {{ if .Setting.EnableWallpaper }}checked{{ end }}> 启用随机壁纸背景
  </label>
  <label>默认文章封面
    <input name="default_cover" value="{{ .Setting.DefaultCover }}">
  </label>
  <label>ICP 信息
    <input name="icp_info" value="{{ .Setting.ICPInfo }}">
  </label>
  <button type="submit" class="btn primary" style="align-self:flex-start">💾 保存设置</button>
</form>

{{ template "admin_shell_close" . }}
{{ end }}
